<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f7f5f1;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{preheader}}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f5f1;padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="width:560px;max-width:100%;">
        <tr><td style="padding-bottom:20px;">
          <span style="font-family:'Space Grotesk',Inter,Arial,sans-serif;font-size:20px;font-weight:700;color:#14171f;">
            Aura Ride<span style="color:#f2a93b;">&bull;</span>
          </span>
        </td></tr>
        <tr><td style="background:#ffffff;border-radius:16px;padding:28px 28px 24px;border:1px solid #e4e0d8;">
          <h1 style="font-family:'Space Grotesk',Inter,Arial,sans-serif;font-size:22px;margin:0 0 16px;color:#14171f;">{{heading}}</h1>
          {{bodyContent}}
        </td></tr>
        <tr><td style="padding-top:18px;text-align:center;font-family:Inter,Arial,sans-serif;font-size:12px;color:#6b6f7b;">
          You're receiving this because of activity on your Aura Ride account.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
