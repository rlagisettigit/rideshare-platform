# Per-event email copy. {{token}} placeholders are substituted with request-specific values
# by EmailTemplates (see EmailTemplateRenderer) - the same tokens the matching
# templates/email/<event>.html fragment uses. The key prefix must match that fragment's
# filename (kebab-case) so EmailTemplateRenderer can look both up from one event name.

booking-requested.subject=New booking request from {{passengerName}}
booking-requested.heading=New booking request
booking-requested.preheader=New booking request from {{passengerName}}
booking-requested.cta=Review this request

booking-confirmed.subject=Your booking is confirmed
booking-confirmed.heading=Booking confirmed
booking-confirmed.preheader=Your booking is confirmed
booking-confirmed.cta=View your booking
booking-confirmed.badge=CONFIRMED

booking-rejected.subject=Your booking request wasn't accepted
booking-rejected.heading=Booking not accepted
booking-rejected.preheader=Your booking request wasn't accepted
booking-rejected.cta=Find another ride
booking-rejected.badge=NOT AVAILABLE

booking-cancelled.subject=Booking cancelled
booking-cancelled.heading=Booking cancelled
booking-cancelled.preheader=Booking cancelled
booking-cancelled.badge=CANCELLED
booking-cancelled.by.driver=the driver
booking-cancelled.by.passenger=the passenger
booking-cancelled.by.system=Aura Ride

ride-started.subject=Your ride has started
ride-started.heading=Your ride has started
ride-started.preheader=Your ride has started
ride-started.cta=Track this ride
ride-started.badge=ON THE WAY

ride-completed.subject=Your ride is complete
ride-completed.heading=Trip complete
ride-completed.preheader=Your ride is complete
ride-completed.cta=Rate your driver
ride-completed.badge=COMPLETED
