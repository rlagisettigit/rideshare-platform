server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: rideshare-platform

  datasource:
    # serverTimezone=UTC tells the driver to treat every TIMESTAMP column as UTC on the wire, but
    # that's only true if the MySQL session itself is actually running in UTC - on a server whose
    # session time_zone defaults to SYSTEM (the host OS zone), the two disagree and every
    # TIMESTAMP read/write silently shifts by the host's UTC offset (e.g. a ride departing in 5
    # hours reads back as having already departed 5 hours ago). sessionVariables forces UTC on
    # the actual connection so it matches what serverTimezone=UTC already assumes, instead of
    # relying on the DB server's own default being configured correctly.
    url: jdbc:mysql://localhost:3307/rideshare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&sessionVariables=time_zone='%2B00:00'
    username: root
    password: Rams@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: rideshare-platform
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.rideshare.platform.kafka.events"

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-should-be-256-bits-min}
    access-token-expiry-ms: 900000        # 15 min
    refresh-token-expiry-ms: 604800000    # 7 days

  h3:
    resolution: 9   # ~174m edge length; used for route indexing

  routing:
    provider: mappls   # abstraction: mappls | google | osrm
    max-detour-km: 5
    max-pickup-radius-km: 2

  search:
    departure-window-hours: 6
    default-page-size: 20

  rate-limit:
    requests-per-minute: 100

  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%X{userId}] %-5level %logger{36} - %msg%n"
  level:
    com.rideshare.platform: INFO
    org.hibernate.SQL: WARN
